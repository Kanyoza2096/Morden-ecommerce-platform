name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests and build
      run: |
        npm run lint
        npx tsc --noEmit
        npm run build
        
    - name: Create release archive
      run: |
        tar -czf ecommerce-platform-${{ github.ref_name }}.tar.gz dist/
        zip -r ecommerce-platform-${{ github.ref_name }}.zip dist/
        
    - name: Generate changelog
      id: changelog
      run: |
        echo "## Changes in ${{ github.ref_name }}" > CHANGELOG.md
        echo "" >> CHANGELOG.md
        git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md || echo "- Initial release" >> CHANGELOG.md
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: CHANGELOG.md
        files: |
          ecommerce-platform-${{ github.ref_name }}.tar.gz
          ecommerce-platform-${{ github.ref_name }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}